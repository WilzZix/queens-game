<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queens — Logic Puzzle</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    try {
      var t = localStorage.getItem("queens.theme");
      document.documentElement.dataset.theme = t === "dark" ? "dark" : "light";
    } catch (e) {
      document.documentElement.dataset.theme = "light";
    }
  </script>
  <script>
    try {
      var l = localStorage.getItem("queens.lang");
      document.documentElement.lang = l === "uz" || l === "ru" ? l : "en";
    } catch (e) {
      document.documentElement.lang = "en";
    }
  </script>
  <script>
    // Safety net: surface any boot error on the page and never leave a blank screen.
    (function () {
      function reveal() {
        var ids = ["view-auth", "view-game", "view-stats"];
        var anyVisible = ids.some(function (id) {
          var e = document.getElementById(id);
          return e && !e.classList.contains("hidden");
        });
        if (!anyVisible) {
          var g = document.getElementById("view-game");
          if (g) g.classList.remove("hidden");
        }
      }
      function showError(msg) {
        var box = document.getElementById("bootError");
        if (box) {
          box.textContent = "⚠ " + msg;
          box.classList.remove("hidden");
        }
        reveal();
      }
      window.addEventListener("error", function (e) {
        showError((e.message || "Error") + (e.filename ? "  @ " + e.filename.split("/").pop() : ""));
      });
      window.addEventListener("unhandledrejection", function (e) {
        var r = e.reason;
        showError("Promise: " + ((r && (r.code || r.message)) || r));
      });
      window.addEventListener("DOMContentLoaded", function () {
        setTimeout(reveal, 4000);
      });
    })();
  </script>
</head>
<body>
  <main class="app">
    <div class="header">
      <div class="lang-switch" id="langSwitch">
        <button class="lang-btn" type="button" data-lang="en">EN</button>
        <button class="lang-btn" type="button" data-lang="uz">UZ</button>
        <button class="lang-btn" type="button" data-lang="ru">RU</button>
      </div>
      <h1 class="title">👑 Queens</h1>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">🌙</button>
    </div>

    <div id="bootError" class="boot-error hidden"></div>

    <div class="user-bar" id="userBar">
      <span class="user-email" id="userEmail"></span>
      <button class="link-btn hidden" id="statsBtn" type="button" data-i18n="nav.stats">Stats</button>
      <button class="link-btn hidden" id="signOutBtn" type="button" data-i18n="nav.signOut">Sign out</button>
      <button class="link-btn hidden" id="loginBtn" type="button" data-i18n="nav.login">Sign in</button>
    </div>

    <section id="view-auth" class="view hidden">
      <p class="auth-sub" data-i18n="auth.subtitle">Sign in to your account</p>
      <button class="btn google-btn" id="googleBtn" type="button" data-i18n="auth.google">Sign in with Google</button>
      <div class="auth-divider" data-i18n="auth.or">or</div>
      <form class="auth-form" id="authForm">
        <input class="auth-input" id="authEmail" type="email" data-i18n-ph="auth.email" placeholder="Email" autocomplete="email" required />
        <input class="auth-input" id="authPassword" type="password" data-i18n-ph="auth.password" placeholder="Password" autocomplete="current-password" required />
        <p class="auth-msg hidden" id="authMsg"></p>
        <button class="btn primary auth-submit" id="authSubmit" type="submit" data-i18n="auth.login">Sign in</button>
      </form>
      <div class="auth-links">
        <button class="link-btn" id="toggleMode" type="button" data-i18n="auth.toSignup">No account? Sign up</button>
        <button class="link-btn" id="resetBtn" type="button" data-i18n="auth.forgot">Forgot password?</button>
        <button class="link-btn" id="backToGameFromAuth" type="button" data-i18n="auth.back">← Back to game</button>
      </div>
    </section>

    <section id="view-game" class="view hidden">
      <div class="sizes" id="sizes">
        <button class="chip" data-size="7">7×7</button>
        <button class="chip active" data-size="8">8×8</button>
        <button class="chip" data-size="9">9×9</button>
      </div>

      <div class="timer" id="timer">⏱ 00:00</div>

      <div class="board-wrap">
        <div class="board" id="board"></div>
        <div class="win-banner hidden" id="win" data-i18n="game.win">🎉 You win!</div>
      </div>

      <div class="save-prompt hidden" id="savePrompt">
        <span data-i18n="save.prompt">Sign in to save your result</span>
        <button class="btn primary" id="savePromptBtn" type="button" data-i18n="save.login">Sign in to save</button>
      </div>

      <div class="panel">
        <button class="btn ghost" id="undo" data-i18n="game.undo">↶ Undo</button>
        <button class="btn ghost" id="clear" data-i18n="game.clear">✕ Clear</button>
        <button class="btn" id="hint" data-i18n="game.hint">💡 Hint</button>
        <button class="btn" id="solve" data-i18n="game.solve">👑 Solve</button>
        <button class="btn primary" id="new" data-i18n="game.new">🔄 New</button>
      </div>

      <p class="rules" data-i18n="game.rules">
        One 👑 in each row, column and color. Queens must not touch. Tap a cell: empty → ✕ → 👑 → empty.
      </p>
    </section>

    <section id="view-stats" class="view hidden">
      <h2 class="stats-title" data-i18n="stats.title">📊 Stats</h2>
      <div id="statsBody" class="stats-body"></div>
      <button class="btn ghost back-btn" id="backToGameBtn" type="button" data-i18n="auth.back">← Back to game</button>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
